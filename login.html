<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - Agencia de Envíos</title>
    <link rel="stylesheet" href="css/estilos.css">
</head>

<body>
    <div class="contenedor">
        <img src="img/logo.png" alt="Logo de la Agencia" class="logo">

        <h2>Iniciar Sesión 🔐</h2>

        <form action="inicio.php" method="POST">
            <label for="correo">Correo electrónico:</label>
            <input type="email" id="correo" name="correo" placeholder="ejemplo@correo.com" required>

            <label for="clave">Contraseña:</label>
            <input type="password" id="clave" name="clave" placeholder="••••••••" required>

            <button type="submit" class="btn">Ingresar</button>
        </form>

        <p>
            <a href="recuperar_contraseña.html" class="olvido">¿Olvidaste tu contraseña?</a>
        </p>

        <p>
            ¿No tienes cuenta? <a href="register.html">Regístrate aquí</a>
        </p>

        <a href="index.html" class="volver">⬅ Volver al inicio</a>
    </div>
</body>
</html>
