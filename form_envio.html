<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Registrar Envío</title>

    <link rel="stylesheet" href="css/estilos.css" />

    <style>
        .contenedor {
            max-width: 600px;
            margin: 40px auto;
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 0 12px rgba(0,0,0,0.2);
        }

        h2 {
            text-align: center;
            color: #007bff;
            margin-bottom: 20px;
        }

        label {
            font-weight: bold;
            margin-top: 15px;
            display: block;
        }

        input, select, textarea {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border-radius: 8px;
            border: 1px solid #ccc;
        }

        textarea {
            height: 120px;
            font-size: 14px;
        }

        .btn {
            background: #007bff;
            color: white;
            padding: 12px;
            text-align: center;
            display: block;
            border-radius: 10px;
            border: none;
            font-size: 16px;
            margin-top: 20px;
            cursor: pointer;
        }

        .btn:hover {
            background: #0056b3;
        }

        a.volver {
            display: block;
            margin-top: 20px;
            text-align: center;
            text-decoration: none;
            font-weight: bold;
            color: #007bff;
        }

        a.volver:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

<div class="contenedor">

    <h2>Registrar un nuevo envío 📦</h2>

    <form action="php/guardar_envio.php" method="POST">

        <label>Nombre del remitente:</label>
        <input type="text" name="remitente" placeholder="Ej: Juan Pérez" required>

        <label>Cédula:</label>
        <input type="number" name="cedula" placeholder="Ej: 123456789" required>

        <label>Ciudad:</label>
        <input type="text" name="ciudad" placeholder="Ej: Bogotá" required>

        <label>Peso del paquete (kg):</label>
        <input type="number" step="0.1" name="peso" placeholder="Ej: 2.5" required>

        <label>Tipo de paquete:</label>
        <select name="tipo" required>
            <option value="">Selecciona una opción</option>
            <option value="Documentos">Documentos</option>
            <option value="Ropa">Ropa</option>
            <option value="Electrónicos">Electrónicos</option>
            <option value="Otros">Otros</option>
        </select>

        <label>Descripción del contenido:</label>
        <textarea name="descripcion" placeholder="Describe brevemente el contenido..." required></textarea>

        <button type="submit" class="btn">Registrar Envío</button>
    </form>

    <a class="volver" href="inicio.php">⬅ Volver al menú principal</a>

</div>

</body>
</html>
