<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Agencia de Envíos</title>

    <link rel="stylesheet" href="css/estilos.css" />

    <style>
        body {
            background: linear-gradient(135deg, #007bff, #00b4d8);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: "Poppins", sans-serif;
            margin: 0;
            padding: 0;
        }

        .contenedor {
            background: white;
            padding: 40px;
            border-radius: 20px;
            width: 90%;
            max-width: 450px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        .contenedor img {
            width: 140px;
            margin-bottom: 20px;
        }

        h1 {
            margin-bottom: 10px;
            color: #222;
        }

        p {
            color: #555;
        }

        .btn {
            display: block;
            margin-top: 25px;
            padding: 12px;
            background: #007bff;
            text-decoration: none;
            color: white;
            font-weight: bold;
            border-radius: 10px;
            transition: 0.3s;
        }

        .btn:hover {
            background: #0056b3;
        }
    </style>
</head>

<body>
    <div class="contenedor">
        <img src="img/logo.png" alt="Logo Agencia" />

        <h1>Agencia de Envíos 📦</h1>
        <p>Administra tus envíos de manera rápida y segura.</p>

        <a href="login.html" class="btn">Iniciar Sesión 🔐</a>
    </div>
</body>
</html>
