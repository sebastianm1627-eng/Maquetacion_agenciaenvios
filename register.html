<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Usuario</title>
    <link rel="stylesheet" href="css/estilos.css">
</head>

<body>
    <div class="contenedor">
        <img src="img/logo.png" alt="Logo de la Agencia" class="logo">

        <h2>Crear una Cuenta ✍️</h2>

        <form action="#" method="POST">
            <label for="nombre">Nombre completo:</label>
            <input type="text" id="nombre" name="nombre" placeholder="Ej: Juan Pérez" required>

            <label for="correo">Correo electrónico:</label>
            <input type="email" id="correo" name="correo" placeholder="ejemplo@correo.com" required>

            <label for="clave">Contraseña:</label>
            <input type="password" id="clave" name="clave" placeholder="••••••••" required>

            <label for="confirmar">Confirmar contraseña:</label>
            <input type="password" id="confirmar" name="confirmar" placeholder="••••••••" required>

            <button type="submit" class="btn btn-secundario">Registrarse</button>
        </form>

        <p>¿Ya tienes cuenta? <a href="login.html">Inicia sesión aquí</a></p>

        <a href="index.html" class="volver">⬅ Volver al inicio</a>
    </div>
</body>
</html>
